name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  do-release:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v6
    - name: Install Erlang
      run: sudo apt-get update && sudo apt-get install erlang rebar3
    - name: Build release
      run: rebar3 release
    - name: Create tarball
      run: |
        APP=$(ls _build/default/rel/)
        VERSION=${GITHUB_REF_NAME#v}
        tar -czf ${APP}-${VERSION}.tar.gz -C _build/default/rel ${APP}
    - name: Create GitHub release and upload asset
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        APP=$(ls _build/default/rel/)
        VERSION=${GITHUB_REF_NAME#v}
        gh release create ${{ github.ref_name }} \
          --title "${{ github.ref_name }}" \
          --generate-notes \
          ${APP}-${VERSION}.tar.gz
